# bomgen configuration — USS Enterprise Deflector Subsystem (see BOMGEN_DESIGN.md §6)

[project]
title_line   = "NCC-1701 BOM DRAFT, 7/12/26"
project_box  = "PROJECT NAME AND TITLE BOX"
system_name  = "USS Enterprise Deflector Subsystem"
assembly_number      = "NCC-FA001-00"        # synthesized Level-0 root (D2)
assembly_name        = "Enterprise Deflector Final Assy (NCC-FA001.SLDASM)"
assembly_description = "Final Deflector Top Level Assembly"
contact_name = "Montgomery Scott"
contact_info = "scotty@starfleet.example"

[columns]
level       = "Level"
qty         = "Qty"
number      = "Number"
name        = "Name"
config      = "Config"
rev         = "Rev"
description = "Description"
found_in    = "Found In"
cots        = "COTS"          # D1: no heuristic; team adds PDM variable
# For the demo, the spec/RFQ dashboard groups by the export's existing
# "Material Specification" column (ASTM refs) — normally you'd point this
# at a dedicated Specs column in your own export. Adjustable, not hardcoded.
specs       = "Material Specification"
passthrough = ["Material", "Mass"]

[rules]
part_number_pattern = '^([A-Za-z]+-[A-Za-z]{2}\d+)'
dash_source = "rev"           # O1: revisit dash-number source
min_marker_columns = 5
state_from_found_in = true

[output]
excel_font = "Aptos Narrow"

[diff]
# Change highlighting (--diff-against): only report columns (mapped +
# passthrough) are compared, so unmapped PDM churn like "Checked Out By"
# never flags a row. List report columns here to exclude them too:
# ignore_columns = ["Rev"]
ignore_columns = []

[budget]
# Spec/RFQ budget rollup (bomgen --budget / --dashboard). Parts are flagged
# into procurement categories via a spec-document reference column in the
# PDM export — mapped by [columns] specs = "Specs" (adjustable, like every
# column). A cell may list several references separated by spec_separator;
# the FIRST is the category used for cost rollup. A spec'd row covers its
# whole subtree (a quoted weldment includes its piece parts); leaf parts
# under no spec are reported as (unassigned) so budget gaps stay visible.
spec_separator = ";"
# To link spec references to their controlled documents on the dashboard,
# set spec_url_template in [links] below.

[links]
# "spec doc ↗" link on each dashboard spec row and in the budget workbook;
# {spec} is the URL-encoded spec reference. Point this at your document
# control system, e.g. "https://docs.example.edu/{spec}". The demo's specs
# are public ASTM references, so the demo just links a search for them:
spec_url_template = "https://www.google.com/search?q={spec}"
# Make each filename in the report a clickable link to your PDM web viewer.
# Placeholders in the template (URL-encoded on substitution):
#   {found_in} = the "Found In" vault folder mapped to a URL path. By default
#                the leading "<drive>:\<Vault>\" is stripped automatically —
#                any drive letter, any vault name — because your base URL
#                already ends in the vault name. Backslashes become "/".
#   {file}     = the SolidWorks filename (NCC-FA001.SLDASM / NCC-FP005.SLDPRT).
# Empty template (default) = no links. Example — a Found In of
#   D:\Steward_Obs_PDM\STP\LAZ\ESC\Flight  (or E:\…, C:\…)
# with the base below yields
#   https://escpdm.as.arizona.edu/solidworkspdm/Steward_Obs_PDM/STP/LAZ/ESC/Flight
# file_url_template = "https://escpdm.as.arizona.edu/solidworkspdm/Steward_Obs_PDM/{found_in}"
# found_in_strip: optional override if the auto "<drive>:\<Vault>\" strip
# isn't right for your layout — a literal prefix to remove instead, e.g.
# "D:\\Steward_Obs_PDM\\STP" to also drop a fixed sub-folder.
file_url_template = ""
found_in_strip = ""

[materials]
# Enrich rows with material properties from the materials database. Commit
# the raw /export/raw-json dump (a JSON array of material documents) next to
# your BOM export and point cache_file at it — bomgen reads it from disk,
# never the network. Matching is by the [columns].material value against each
# record's Material / Material_Synonyms (whitespace/case-insensitive).
# Enable and configure per project:
# enabled    = true
# cache_file = "materials.json"
# properties = ["Density_kg/m3", "CTE_u/k", "Tensile_Strength_mpa",
#                "Total_mass_loss", "Collected_volatile_condensed_mass"]
# show_units = true       # "2700 kg/m3" vs bare "2700"
# NB: property keys contain "/", so quote them as TOML keys in `labels`:
# labels = { "Total_mass_loss" = "TML", "Collected_volatile_condensed_mass" = "CVCM" }
enabled = false
