# Publish the BOM (HTML + downloadable .xlsx) to GitHub Pages on every push
# to the default branch. Setup steps: see PAGES_SETUP.md §GitHub.
name: Publish BOM to GitHub Pages

on:
  push:
    branches: [main]
    tags: ["*"]   # pushing a tag republishes with the new version in history
  workflow_dispatch: {}

# Which BOM to publish. Point BOM_INPUT at your own PDM export (checked into
# the repo) and BOM_CONFIG at its bomgen.toml.
env:
  BOM_INPUT: examples/NCC-1701_pdmout.csv
  BOM_CONFIG: bomgen.toml
  # Demo site shows every feature: the spec/RFQ dashboard + budget workbook,
  # and per-tag historical pages with the version dropdown (needs >=1 git
  # tag; tags rebuild with the current generator on every run).
  BUILD_DASHBOARD: "1"
  BUILD_HISTORY: "1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history + tags: needed for diff + historical builds
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install pdmbomgen (same packaging downstream repos use)
        run: pip install ".[test]"
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Build site (index.html + .xlsx)
        run: bash scripts/build_pages.sh "$BOM_INPUT" "$BOM_CONFIG" _site
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment_retry.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        name: Deploy to GitHub Pages
        continue-on-error: true
        uses: actions/deploy-pages@v5
      - name: Wait before retrying Pages deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - id: deployment_retry
        name: Retry GitHub Pages deployment
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
