# bomgen configuration for this vault repo — see BOMGEN_DESIGN.md §6 in
# https://github.com/douglase/pdmbomgen for the full field reference.
# Edit every value below to match your project once you've dropped in your
# real PDM export.

[project]
title_line   = "BOM DRAFT"
project_box  = "PROJECT NAME AND TITLE BOX"
system_name  = ""
assembly_number      = "TOP-LEVEL-00"       # synthesized Level-0 root
assembly_name        = "Top Level Assembly"
assembly_description = ""
contact_name = ""
contact_info = ""

[columns]
level       = "Level"
qty         = "Qty"
number      = "Number"
name        = "Name"
config      = "Config"
rev         = "Rev"
description = "Description"
found_in    = "Found In"
cots        = "COTS"
passthrough = []                             # e.g. ["Material", "Mass"]

[rules]
part_number_pattern = '^([A-Za-z]+-[A-Za-z]{2}\d+)'
dash_source = "rev"
min_marker_columns = 5
state_from_found_in = true

[output]
excel_font = "Aptos Narrow"

[links]
# Link each filename to your PDM web viewer. "{file}" is replaced with the
# (URL-encoded) SolidWorks filename (e.g. ESC-FA001.SLDASM). Empty = no
# links. Set host/vault path to yours, for example:
# file_url_template = "https://your-pdm.example.edu/solidworkspdm/Vault/PROJECT?view=bom&file={file}"
file_url_template = ""

[materials]
# Enrich rows with properties from the materials database. Commit the raw
# /export/raw-json dump alongside your BOM export and point cache_file at it
# (bomgen reads it from disk, never the network). Match is by material name.
# enabled    = true
# cache_file = "vault/materials.json"
# properties = ["Density_kg/m3", "CTE_u/k", "Tensile_Strength_mpa"]
# labels     = { "Total_mass_loss" = "TML" }   # quote keys that contain "/"
enabled = false
