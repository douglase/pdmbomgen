# Publish this vault's BOM (HTML + downloadable .xlsx) to GitHub Pages.
# Runs on every push to the default branch, on demand, AND on a weekly
# schedule — the schedule matters here: it rebuilds even if nobody has
# touched BOM_INPUT recently, so a fix merged into pdmbomgen's main branch
# (pulled fresh via requirements.txt) still reaches this site without
# anyone having to remember to re-run it. See ../SETUP.md.
name: Publish BOM to GitHub Pages

on:
  push:
    branches: [main]
    tags: ["*"]   # pushing a tag republishes immediately with the new version
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC — picks up upstream pdmbomgen fixes

# Which BOM this repo publishes. Point at your real PDM export once you've
# replaced vault/PLACEHOLDER_pdmout.csv.
env:
  BOM_INPUT: vault/PLACEHOLDER_pdmout.csv
  BOM_CONFIG: bomgen.toml
  # Every git tag is rebuilt with the CURRENT generator on every run (so
  # dashboard improvements retroactively apply to all historical source
  # data — no compiled branch). Tag pages get yellow historical chrome, a
  # version dropdown, and green change-highlighting vs the previous tag.
  BUILD_HISTORY: "1"
  # Spec/RFQ budget dashboard + workbook; needs a specs column (bomgen.toml)
  BUILD_DASHBOARD: "1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history: needed so `git log -- INPUT` finds its real last commit
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Configure access to private pdmbomgen (no-op if public)
        # The default GITHUB_TOKEN can't read a *different* private repo.
        # If pdmbomgen stays private, add a repo secret PDMBOMGEN_PAT (a
        # GitHub PAT with read-only access to it: Settings > Secrets and
        # variables > Actions). Unset -> this step does nothing and plain
        # anonymous clone is used, which is all a public pdmbomgen needs.
        # See ../SETUP.md.
        env:
          PDMBOMGEN_PAT: ${{ secrets.PDMBOMGEN_PAT }}
        run: |
          if [ -n "$PDMBOMGEN_PAT" ]; then
            git config --global url."https://oauth2:${PDMBOMGEN_PAT}@github.com/".insteadOf "https://github.com/"
          fi
      - name: Install pdmbomgen (tracks upstream main — see requirements.txt)
        run: pip install -r requirements.txt
      - name: Build site (index.html + .xlsx, stamped with the CSV's commit)
        run: bash scripts/build_pages.sh "$BOM_INPUT" "$BOM_CONFIG" _site
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
