# Publish this vault's BOM (HTML + downloadable .xlsx) to GitLab Pages.
# GitLab Pages convention: a job named `pages` that emits a `public/`
# artifact is deployed automatically — no further configuration needed.
#
# Also set up a scheduled Pipeline (Build > Pipeline schedules, e.g.
# weekly) — GitLab schedules aren't expressed in this YAML file, they're a
# project setting. The schedule matters here: it rebuilds even when nobody
# has touched BOM_INPUT recently, so a fix merged into pdmbomgen's main
# branch (pulled fresh via requirements.txt) still reaches this site
# without anyone having to remember to re-run it. See ../SETUP.md.

variables:
  GIT_DEPTH: "0"   # full history: needed so `git log -- INPUT` finds its real last commit

pages:
  image: python:3.12-slim
  variables:
    # Which BOM this repo publishes. Point at your real PDM export once
    # you've replaced vault/PLACEHOLDER_pdmout.csv. Can also be overridden
    # per-project in Settings > CI/CD > Variables.
    BOM_INPUT: vault/PLACEHOLDER_pdmout.csv
    BOM_CONFIG: bomgen.toml
    # Rebuild every git tag with the current generator (yellow historical
    # pages + version dropdown + green change-highlighting vs previous tag)
    BUILD_HISTORY: "1"
    # Spec/RFQ budget dashboard + workbook (needs a specs column)
    BUILD_DASHBOARD: "0"
  before_script:
    # python:3.12-slim has no git — needed both for pip's `git+https://...`
    # install of pdmbomgen (requirements.txt) and for build_pages.sh's own
    # `git log` provenance lookup.
    - apt-get update -qq && apt-get install -y --no-install-recommends git
      >/dev/null
    # If pdmbomgen is a private repo, anonymous `git clone` fails
    # ("could not read Username"). Set a masked/protected CI/CD variable
    # PDMBOMGEN_TOKEN (Settings > CI/CD > Variables) to a GitHub PAT with
    # read-only access to it, and this rewrites the clone URL to use it.
    # No-op (and no setup needed) if pdmbomgen is public — see ../SETUP.md.
    - |
      if [ -n "${PDMBOMGEN_TOKEN:-}" ]; then
        git config --global url."https://oauth2:${PDMBOMGEN_TOKEN}@github.com/".insteadOf "https://github.com/"
      fi
  script:
    - pip install -r requirements.txt
    - bash scripts/build_pages.sh "$BOM_INPUT" "$BOM_CONFIG" public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG   # pushing a tag republishes with the new version
